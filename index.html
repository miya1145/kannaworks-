<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kannaworks｜カンナワークス</title>
  <meta name="description" content="kannaworksは、木のカンナ屑を使った装飾品・空間演出素材を制作しています。" />

  <style>
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: #3f342b;
      background: #f8f4ee;
      line-height: 1.8;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      box-sizing: border-box;
    }

    .card {
      max-width: 760px;
      width: 100%;
      background: rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      padding: 56px 40px;
      box-shadow: 0 18px 50px rgba(80, 60, 40, 0.08);
      box-sizing: border-box;
    }

    .label {
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #9a7b5f;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 0.08em;
      margin: 0 0 12px;
      font-weight: 500;
    }

    .subtitle {
      font-size: 18px;
      margin: 0 0 36px;
      color: #6d5a49;
    }

    .lead {
      font-size: 17px;
      margin-bottom: 28px;
    }

    .text {
      font-size: 15px;
      color: #5a4a3d;
      margin-bottom: 36px;
    }

    .info {
      border-top: 1px solid #e4d8ca;
      padding-top: 24px;
      font-size: 14px;
      color: #6b5948;
    }

    .info p {
      margin: 6px 0;
    }

    a {
      color: #7b5f45;
      text-decoration: none;
      border-bottom: 1px solid #c9b7a4;
    }

    @media (max-width: 600px) {
      .card {
        padding: 40px 24px;
        border-radius: 22px;
      }

      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 16px;
      }

      .lead {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <div class="label">wood shaving works</div>

      <h1>kannaworks</h1>

      <p class="subtitle">
        木のカンナ屑から生まれる、軽やかな装飾品と空間演出素材。
      </p>

      <p class="lead">
        kannaworksは、大工さんが削った木のカンナ屑を使い、<br>
        オーナメントやアクセサリー、空間を彩る作品を制作しています。
      </p>

      <p class="text">
        本来なら捨てられてしまうはずだった素材に、<br>
        木のぬくもりと、新たな輝きを。<br>
        ふんわりと軽やかな質感や、やさしい木の香りを大切にしながら、<br>
        暮らしや空間にそっとなじむ作品をお届けしています。
      </p>

      <div class="info">
        <p>公式サイトは現在準備中です。</p>
        <p>Instagram：<a href="https://www.instagram.com/kannaworks.m/" target="_blank" rel="noopener">@kannaworks.m</a></p>
        <p>Contact：kannaworksinfo@gmail.com</p>
      </div>
    </section>
  </main>
</body>
</html>
